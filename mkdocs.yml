site_name: RaBe ISRC Working Group
site_description: >- 
  🎵 The RaBe ISRC Working Group aims to be the primary contact toward improving
  everything related to how we consume and interact with ISRC/ISO 3901 identifiers
  at Radio Bern RaBe. 📻
site_author: RaBe IT-Reaktion
site_url: https://radiorabe.github.io/wg-isrc/
repo_url: https://github.com/radiorabe/wg-isrc
repo_name: radiorabe/wg-isrc

theme:
  name: "material"
  palette:
    # Palette toggle for dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    # Palette toggle for light mode
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  icon:
    repo: fontawesome/brands/git-alt
  features:
    - content.code.copy
    - content.code.annotate
    - toc.integrate

markdown_extensions:
- pymdownx.highlight:
    anchor_linenums: true
- pymdownx.inlinehilite
- pymdownx.snippets
- pymdownx.superfences

extra_css:
- css/style.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/radiorabe/wg-isrc
      name: RaBe ISRC Working Group on GitHub 🎵

plugins:
- search
- social:
    cards_layout_options:
      background_color: "#00C9BF"
      color: "#ffffff"
- gen-files:
    scripts:
    - docs/gen_ref_pages.py
- literate-nav
- section-index

nav:
  - README: index.md

watch:
  - README.md
